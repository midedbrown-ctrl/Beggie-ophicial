<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beggie Official | Social Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: #0f172a;
            background-image: radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                              radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%);
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
        }
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .btn-hover:hover {
            transform: scale(1.02);
            background: rgba(255, 255, 255, 0.08);
        }
        /* Style for the Designer Credit */
        .designer-footer {
            color: #cbd5e1; /* Light slate for high visibility */
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <div class="text-center mt-12 mb-8">
        <div class="w-24 h-24 rounded-full bg-gradient-to-r from-cyan-500 to-blue-500 mx-auto p-1 shadow-2xl">
            <div class="w-full h-full rounded-full bg-slate-900 flex items-center justify-center overflow-hidden border-2 border-white/10">
                <i class="fas fa-bolt text-4xl text-cyan-400"></i>
            </div>
        </div>
        <h1 class="text-3xl font-extrabold mt-4 tracking-tight text-white">Beggie Official</h1>
        <p class="text-slate-400 text-sm font-medium tracking-wide">Digital Content Creator</p>
    </div>

    <div class="w-full max-w-sm mb-8 glass rounded-3xl p-2 shadow-2xl border border-white/10 overflow-hidden">
        <div class="rounded-2xl overflow-hidden flex justify-center bg-black min-h-[500px]">
            <blockquote class="tiktok-embed" 
                cite="https://www.tiktok.com/@captain_ciise/video/7596388611369585976" 
                data-video-id="7596388611369585976" 
                style="width: 100%; border: none;"> 
                <section></section> 
            </blockquote> 
            <script async src="https://www.tiktok.com/embed.js"></script>
        </div>
    </div>

    <div class="w-full max-w-sm space-y-3">
        
        <a href="https://www.tiktok.com/@captain_ciise" target="_blank" class="flex items-center p-4 glass rounded-2xl btn-hover transition-all">
            <i class="fab fa-tiktok text-xl w-8"></i>
            <span class="flex-grow font-semibold ml-3">TikTok Profile</span>
            <i class="fas fa-external-link-alt text-xs text-slate-500"></i>
        </a>

        <a href="https://www.instagram.com" target="_blank" class="flex items-center p-4 glass rounded-2xl btn-hover transition-all">
            <i class="fab fa-instagram text-xl w-8 text-pink-500"></i>
            <span class="flex-grow font-semibold ml-3">Instagram</span>
            <i class="fas fa-external-link-alt text-xs text-slate-500"></i>
        </a>

        <a href="https://t.me/telegram" target="_blank" class="flex items-center p-4 glass rounded-2xl btn-hover transition-all">
            <i class="fab fa-telegram-plane text-xl w-8 text-sky-400"></i>
            <span class="flex-grow font-semibold ml-3">Telegram Channel</span>
            <i class="fas fa-external-link-alt text-xs text-slate-500"></i>
        </a>

        <a href="https://www.facebook.com" target="_blank" class="flex items-center p-4 glass rounded-2xl btn-hover transition-all">
            <i class="fab fa-facebook text-xl w-8 text-blue-500"></i>
            <span class="flex-grow font-semibold ml-3">Facebook</span>
            <i class="fas fa-external-link-alt text-xs text-slate-500"></i>
        </a>

    </div>

    <div class="w-full max-w-sm mt-10 glass rounded-3xl p-6 mb-10 shadow-2xl border border-white/5">
        <h3 class="text-lg font-bold mb-4 flex items-center">
            <i class="fab fa-whatsapp mr-3 text-green-400 text-xl"></i>
            Message Me
        </h3>
        <div class="space-y-4">
            <input type="text" id="userName" placeholder="Full Name" class="w-full bg-slate-900/50 border border-white/10 rounded-xl p-3 text-sm text-white focus:outline-none focus:border-green-500">
            <textarea id="userMsg" placeholder="What's on your mind?" class="w-full bg-slate-900/50 border border-white/10 rounded-xl p-3 text-sm text-white h-28 focus:outline-none focus:border-green-500 resize-none"></textarea>
            
            <button onclick="sendToWhatsApp()" class="w-full bg-green-600 hover:bg-green-500 text-white font-bold py-4 rounded-xl shadow-lg transition-all active:scale-95 flex items-center justify-center">
                <i class="fas fa-paper-plane mr-2"></i> Send to WhatsApp
            </button>
        </div>
    </div>

    <footer class="designer-footer text-[11px] mb-12 uppercase font-bold text-center tracking-widest">
        Designed by <span class="text-white border-b border-cyan-500 pb-1">MidedBrown©</span>
    </footer>

    <script>
        function sendToWhatsApp() {
            const name = document.getElementById('userName').value;
            const message = document.getElementById('userMsg').value;
            
            // CHANGE THE NUMBER BELOW (233 is Ghana)
            const phoneNumber = "233000000000"; 

            if(name === "" || message === "") {
                alert("Please type your name and message first!");
                return;
            }

            const text = "Hello Beggie Official! %0A%0A*From:* " + name + "%0A*Message:* " + message;
            window.open("https://wa.me/" + phoneNumber + "?text=" + text, '_blank');
        }
    </script>

</body>
</html>
