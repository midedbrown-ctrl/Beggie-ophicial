<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beggie Official | Social Hub</title>
    <!-- Tailwind CSS for modern styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: #0f172a;
            background-image: radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                              radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%);
            color: white;
            font-family: 'Inter', sans-serif;
        }
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .btn-hover:hover {
            transform: scale(1.02);
            background: rgba(255, 255, 255, 0.08);
        }
        /* Style for the video to ensure it covers the area nicely */
        .video-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-6">

    <!-- Profile Info -->
    <div class="text-center mt-10 mb-8">
        <div class="w-28 h-28 rounded-full bg-gradient-to-r from-cyan-500 to-blue-500 mx-auto p-1 shadow-2xl">
            <div class="w-full h-full rounded-full bg-slate-900 flex items-center justify-center overflow-hidden border-2 border-white/10">
                <i class="fas fa-bolt text-4xl text-cyan-400"></i>
            </div>
        </div>
        <h1 class="text-3xl font-extrabold mt-4 tracking-tight text-white">Beggie Official</h1>
        <p class="text-slate-400 text-sm font-medium tracking-wide">Digital Content Creator</p>
    </div>

    <!-- Autoplay Video Section -->
    <div class="w-full max-w-sm mb-8 glass rounded-3xl p-2 overflow-hidden shadow-xl border border-white/10">
        <div class="video-container aspect-[9/16] bg-slate-800 rounded-2xl overflow-hidden relative">
            <!-- 
                 Muted is required for Autoplay to work. 
                 Playsinline is required for iPhone/Safari users. 
            -->
            <video 
                autoplay 
                muted 
                loop 
                playsinline 
                poster="https://via.placeholder.com/400x700/0f172a/666666?text=Loading+Beggie+Official..."
            >
                <source src="https://assets.mixkit.co/videos/preview/mixkit-man-dancing-under-the-sun-in-a-park-42234-large.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
            
            <!-- Floating TikTok Badge -->
            <div class="absolute bottom-4 left-4 flex items-center bg-black/50 backdrop-blur-md px-3 py-1.5 rounded-full border border-white/20">
                <i class="fab fa-tiktok text-white mr-2 text-xs"></i>
                <span class="text-[10px] font-bold text-white tracking-wider">@BeggieOfficial</span>
            </div>
        </div>
    </div>

    <!-- Social Links Grid -->
    <div class="w-full max-w-sm space-y-3">
        
        <!-- TikTok -->
        <a href="https://www.tiktok.com/@tiktok" target="_blank" class="flex items-center p-4 glass rounded-2xl btn-hover transition-all">
            <i class="fab fa-tiktok text-xl w-8"></i>
            <span class="flex-grow font-semibold ml-3">TikTok</span>
            <i class="fas fa-arrow-up-right-from-square text-xs text-slate-500"></i>
        </a>

        <!-- Instagram -->
        <a href="https://www.instagram.com" target="_blank" class="flex items-center p-4 glass rounded-2xl btn-hover transition-all">
            <i class="fab fa-instagram text-xl w-8 text-pink-500"></i>
            <span class="flex-grow font-semibold ml-3">Instagram</span>
            <i class="fas fa-arrow-up-right-from-square text-xs text-slate-500"></i>
        </a>

        <!-- WhatsApp (Prominent Call to Action) -->
        <a href="https://wa.me/233000000000?text=Hello%20Beggie%20Official!" target="_blank" class="flex items-center p-4 bg-green-500/10 border border-green-500/20 rounded-2xl btn-hover transition-all group">
            <div class="bg-green-500 p-2 rounded-lg mr-3 transition-transform group-hover:scale-110">
                <i class="fab fa-whatsapp text-white text-lg"></i>
            </div>
            <span class="flex-grow font-semibold text-green-400">WhatsApp Message</span>
            <span class="bg-green-500 text-white text-[9px] px-2 py-0.5 rounded-full font-bold animate-pulse">ONLINE</span>
        </a>

        <!-- Telegram -->
        <a href="https://t.me/telegram" target="_blank" class="flex items-center p-4 glass rounded-2xl btn-hover transition-all">
            <i class="fab fa-telegram text-xl w-8 text-sky-400"></i>
            <span class="flex-grow font-semibold ml-3">Telegram</span>
            <i class="fas fa-arrow-up-right-from-square text-xs text-slate-500"></i>
        </a>

        <!-- Facebook -->
        <a href="https://www.facebook.com" target="_blank" class="flex items-center p-4 glass rounded-2xl btn-hover transition-all">
            <i class="fab fa-facebook text-xl w-8 text-blue-500"></i>
            <span class="flex-grow font-semibold ml-3">Facebook</span>
            <i class="fas fa-arrow-up-right-from-square text-xs text-slate-500"></i>
        </a>

    </div>

    <!-- Contact Form Section -->
    <div class="w-full max-w-sm mt-10 glass rounded-3xl p-6 mb-10 shadow-2xl border border-white/5">
        <h3 class="text-lg font-bold mb-4 flex items-center">
            <i class="fas fa-envelope-open-text mr-3 text-cyan-400"></i>
            Send a Message
        </h3>
        <form action="https://formspree.io/f/your_id_here" method="POST" class="space-y-4">
            <input type="text" name="name" placeholder="Full Name" required class="w-full bg-slate-900/50 border border-white/10 rounded-xl p-3 text-sm focus:outline-none focus:border-cyan-500 transition-colors">
            <textarea name="message" placeholder="What's on your mind?" required class="w-full bg-slate-900/50 border border-white/10 rounded-xl p-3 text-sm h-28 focus:outline-none focus:border-cyan-500 transition-colors resize-none"></textarea>
            <button type="submit" class="w-full bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-4 rounded-xl shadow-lg transition-all active:scale-95">Send Now</button>
        </form>
    </div>

    <footer class="text-slate-600 text-[10px] mb-10 uppercase tracking-[0.2em] font-bold">
        Designed by Your Name
    </footer>

</body>
</html>
